###############################################################
# kubernetes/services/banking-api-service.yaml
# Service and Ingress for Core Banking API
###############################################################
apiVersion: v1
kind: Service
metadata:
  name: banking-api
  namespace: banking
  labels:
    app.kubernetes.io/name: banking-api
    app.kubernetes.io/component: api
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: banking-api
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
  sessionAffinity: None

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: banking-api-ingress
  namespace: banking
  labels:
    app.kubernetes.io/name: banking-api
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/use-private-ip: "true"
    appgw.ingress.kubernetes.io/request-timeout: "30"
    appgw.ingress.kubernetes.io/waf-policy-for-path: /subscriptions/SUBSCRIPTION_ID/resourceGroups/rg-pwc-banking-platform-prod-uks/providers/Microsoft.Network/applicationGatewayWebApplicationFirewallPolicies/waf-banking-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
    - hosts:
        - api.banking.internal
      secretName: banking-api-tls
  rules:
    - host: api.banking.internal
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: banking-api
                port:
                  name: http
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: banking-api
                port:
                  name: http

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: banking-api-netpol
  namespace: banking
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: banking-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443   # HTTPS to Azure services
        - protocol: TCP
          port: 5432  # PostgreSQL
        - protocol: TCP
          port: 6380  # Azure Cache for Redis (TLS)
    - to: []
      ports:
        - protocol: UDP
          port: 53   # DNS resolution
